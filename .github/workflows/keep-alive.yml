name: Keep Server Alive

on:
  schedule:
    # Run every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping-server:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Server
        run: |
          curl -f https://classroomspace-learner.onrender.com/api/health || curl -f https://classroomspace-learner.onrender.com/